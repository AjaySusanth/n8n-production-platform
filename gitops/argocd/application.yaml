apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-dev
  namespace: argocd
spec: 
  project: n8n-project
  source:
    repoURL: n8ndevacrajay789.azurecr.io/helm
    targetRevision: 1.0.0
    chart: n8n
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # create dev namespace if not exist