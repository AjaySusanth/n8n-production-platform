name: Helm Chart CI
on:
  push:
    branches:
      - main
    paths:
      - 'helm/n8n/**'
  pull_request:
    branches:
      - main
    paths:
      - 'helm/n8n/**'
  workflow_dispatch:


permissions:
  id-token: write
  contents: write

env:
  ACR_NAME: "n8ndevacrajay789"

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Helm Lint
        run: |
          helm lint ./helm/n8n --strict --values ./helm/n8n/values.yaml

      
      - name: Azure OIDC Login
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Helm Registry Login
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          USER_NAME="00000000-0000-0000-0000-000000000000"
          PASSWORD=$(az acr login --name ${{ env.ACR_NAME }} \
            --expose-token --output tsv --query accessToken)
          echo "::add-mask::$PASSWORD"    # masks it in all subsequent logs
          echo "$PASSWORD" | helm registry login ${{ env.ACR_NAME }}.azurecr.io \
            --username "$USER_NAME" --password-stdin
      
      - name: Package and Push Helm Chart
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          CHART_VERSION=$(grep '^version:' ./helm/n8n/Chart.yaml | awk '{print $2}')
          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          NEW_VERSION="${CHART_VERSION}-${GIT_SHA_SHORT}"
          echo "Packaging chart version: $NEW_VERSION"
          helm package ./helm/n8n --version "$NEW_VERSION" --destination .
          helm push "n8n-${NEW_VERSION}.tgz" oci://${{ env.ACR_NAME }}.azurecr.io/helm
      
      - name: Auto-promote Chart Version in ArgoCD
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          CHART_VERSION=$(grep '^version:' ./helm/n8n/Chart.yaml | awk '{print $2}')
          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          NEW_VERSION="${CHART_VERSION}-${GIT_SHA_SHORT}"
          
          # Replace the targetRevision in application.yaml with the exact packaged version
          sed -i "s/targetRevision:.*/targetRevision: ${NEW_VERSION}/" gitops/argocd/application.yaml
          
          # Configure Git credentials for GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push the updated application.yaml
          git add gitops/argocd/application.yaml
          git commit -m "chore(gitops): auto-promote n8n chart to version ${NEW_VERSION} [skip ci]" || echo "No changes to commit"
          git push origin main
