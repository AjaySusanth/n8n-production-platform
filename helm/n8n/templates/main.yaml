apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.main.fullname" . }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: main
spec:
  replicas: {{ .Values.n8n.main.replicaCount }}
  selector:
    matchLabels:
      {{- include "n8n.main.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "n8n.main.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "n8n.fullname" . }}-main
      securityContext:
        fsGroup: 1000
      containers:
        - name: n8n
          image: "{{ .Values.n8n.image.repository }}:{{ .Values.n8n.image.tag }}"
          imagePullPolicy: {{ .Values.n8n.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: EXECUTIONS_MODE
              value: "queue"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.fullname" . }}-db-secrets
                  key: n8n-encryption-key
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: {{ include "n8n.fullname" . }}-postgres
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_USER
              value: "n8n"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.fullname" . }}-db-secrets
                  key: postgres-password
            - name: QUEUE_BULL_REDIS_HOST
              value: {{ include "n8n.fullname" . }}-redis
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.fullname" . }}-db-secrets
                  key: redis-password
            - name: N8N_METRICS
              value: "true"
            - name: N8N_METRICS_INCLUDE_QUEUE_METRICS
              value: "true"
              
          ports:
            - name: http
              containerPort: 5678
          resources:
            {{- toYaml .Values.n8n.main.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "n8n.fullname" . }}-secrets
